name: Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/provider-*/**'
      - 'eval/**'

jobs:
  accuracy-eval:
    name: Accuracy Eval Harness
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: askchokro_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: askchokro_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Seed test database
        run: PGPASSWORD=test_password psql -h localhost -U askchokro_test -d askchokro_eval -f eval/dataset/seed.sql

      - name: Install and start Ollama
        run: |
          # Install Ollama natively (no Docker networking issues)
          curl -fsSL https://ollama.com/install.sh | sh

          # Start Ollama server in the background
          ollama serve &

          # Wait for the Ollama server to be ready (up to 30s)
          echo "Waiting for Ollama server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama server is ready."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Ollama server failed to start within 30s."
              exit 1
            fi
            sleep 1
          done

          # Pull the model and verify it downloaded successfully
          echo "Pulling qwen2.5-coder:3b (lightweight model for CI)..."
          ollama pull qwen2.5-coder:3b

          # Verify model is available
          ollama list | grep -q "qwen2.5-coder:3b" || { echo "ERROR: Model pull failed."; exit 1; }
          echo "Model ready."

      - name: Run eval harness
        run: pnpm eval
        env:
          EVAL_PROVIDER: ollama
          OLLAMA_MODEL: qwen2.5-coder:3b
          EVAL_PASS_THRESHOLD: 50
          DATABASE_URL: postgresql://askchokro_test:test_password@localhost:5432/askchokro_eval

      - name: Upload eval reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: |
            eval/report.json
            eval/report.html

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            let body = '### AskChokro Eval Failed to run';
            try {
              const report = JSON.parse(fs.readFileSync('eval/report.json', 'utf8'));
              const pass = report.successRate >= 50 ? 'PASS' : 'FAIL';
              body = `### ${pass} — AskChokro Eval Report
            
            **Provider:** ${report.providerName} (${report.modelName})
            **Accuracy:** ${report.successRate.toFixed(1)}% (${report.successCount}/${report.total})
            **Total Tokens:** ${report.totalTokens.toLocaleString()}
            
            | Category | Pass/Total | Accuracy |
            |----------|------------|----------|
            `;
              for (const [cat, stats] of Object.entries(report.categories)) {
                const rate = ((stats.success / stats.total) * 100).toFixed(1);
                body += `| ${cat} | ${stats.success}/${stats.total} | ${rate}% |\n`;
              }
              body += `\n*Download the \`eval-report\` artifact to view the detailed HTML breakdown.*`;
            } catch (e) {
              console.log('Could not parse report.json', e);
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
