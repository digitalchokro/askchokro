name: Eval

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/provider-*/**'
      - 'eval/**'

jobs:
  accuracy-eval:
    name: Accuracy Eval Harness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: askchokro_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: askchokro_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Seed test database
        run: PGPASSWORD=test_password psql -h localhost -U askchokro_test -d askchokro_eval -f eval/dataset/seed.sql

      - name: Run eval harness (Gemini with key rotation)
        run: pnpm eval
        env:
          EVAL_PROVIDER: gemini
          # Both keys are passed — GeminiProvider rotates to next if one hits quota
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }},${{ secrets.GEMINI_API_KEY_2 }},${{ secrets.GEMINI_API_KEY_3 }},${{ secrets.GEMINI_API_KEY_4 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EVAL_PASS_THRESHOLD: '80'
          DATABASE_URL: postgresql://askchokro_test:test_password@localhost:5432/askchokro_eval

      - name: Upload eval reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: |
            eval/report.json
            eval/report.html

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            let body = '### AskChokro Eval Failed to run';
            try {
              const report = JSON.parse(fs.readFileSync('eval/report.json', 'utf8'));
              const pass = report.successRate >= 80 ? 'PASS' : 'FAIL';
              body = `### ${pass} — AskChokro Eval Report

            **Provider:** ${report.providerName} (${report.modelName})
            **Accuracy:** ${report.successRate.toFixed(1)}% (${report.successCount}/${report.total})
            **Threshold:** 80%

            | Category | Pass/Total | Accuracy |
            |----------|------------|----------|
            `;
              for (const [cat, stats] of Object.entries(report.categories)) {
                const rate = ((stats.success / stats.total) * 100).toFixed(1);
                body += `            | ${cat} | ${stats.success}/${stats.total} | ${rate}% |\n`;
              }
              body += `\n            *Download the \`eval-report\` artifact to view the detailed HTML breakdown.*`;
            } catch (e) {
              console.log('Could not parse report.json', e);
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
