name: "Good First Issue: Add Database Adapter"
description: Contribute a new database adapter
title: "[Adapter]: Add support for [DATABASE_NAME]"
labels: ["good first issue", "adapter", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎉 Great first contribution!

        Adding a new database adapter lets AskChokro work with more databases. Each adapter is an independent package that implements the `DatabaseAdapter` interface from `@digitalchokro/core`.

        ## What you'll build

        A new package at `packages/db-yourdb/` that implements:

        ```typescript
        import type { DatabaseAdapter, QueryResult, RawSchemaResult } from '@digitalchokro/core';

        export class YourDBAdapter implements DatabaseAdapter {
          readonly dialect = 'yourdb';
          readonly name = 'yourdb';

          async execute(sql: string, params?: unknown[]): Promise<QueryResult> {
            // Execute the query using your DB driver
          }

          async introspectSchema(): Promise<RawSchemaResult> {
            // Query information_schema or equivalent
          }

          async close(): Promise<void> {
            // Release connections
          }
        }
        ```

        ## Steps
        1. Create the package directory and `package.json` (with DB driver as a peer dependency)
        2. Implement the `DatabaseAdapter` interface
        3. Add unit tests (mock the driver) and integration tests (Docker-based)
        4. Open a PR

  - type: input
    id: database
    attributes:
      label: Database
      description: Which database are you adding support for?
      placeholder: "e.g., MySQL, MSSQL, MariaDB, CockroachDB"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any relevant details about the database driver or your approach.
