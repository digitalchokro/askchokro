name: Bug Report
description: Report a bug in AskChokro
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the information below to help us reproduce and fix the issue.
  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which @digitalchokro/* package version are you using?
      placeholder: "@digitalchokro/core@0.1.0"
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      options:
        - "@digitalchokro/core"
        - "@digitalchokro/db-postgres"
        - "@digitalchokro/db-sqlite"
        - "@digitalchokro/provider-ollama"
        - "@digitalchokro/provider-openai"
        - "@digitalchokro/adapter-express"
        - "@digitalchokro/adapter-nextjs"
        - "@digitalchokro/cli"
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, database, AI provider/model, etc.
      value: |
        - Node.js:
        - OS:
        - Database:
        - AI Provider/Model:
